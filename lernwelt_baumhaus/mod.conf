name = lernwelt_baumhaus
title = Lernwelt: Baumhaus-Forscher
description = Markenfreies Lernwelt-Thema: ein Dschungel-Baumhaus zum Erforschen. Stockwerke des Waldes (Blaetterdach, Fluss, alte Ruinen), Raumorientierung (oben/unten, Norden/Osten), eine Schnitzeljagd mit Bild-Hinweisen in Bilderrahmen, Forscher-Kompass, rettbare Dschungeltiere, Reit-Papagei, kletterbare Lianen und Strickleitern, grosses Baumhaus als Basis, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Schwerpunkt NMG.3 / Raumorientierung. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs
