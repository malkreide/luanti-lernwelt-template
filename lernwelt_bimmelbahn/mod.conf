name = lernwelt_bimmelbahn
title = Lernwelt: Bimmelbahn-Land
description = Markenfreies Lernwelt-Thema: ein Hauptbahnhof und mehrere bunte Doerfer (Rotdorf, Gelbdorf, Blaudorf, Gruendorf), durch Schienen verbunden. Routen und die Reihenfolge der Stationen planen, einfache Weichen- und Signal-Logik (wenn-dann), Farben zuordnen, eine fahrbare Bimmelbahn, Fahrgaeste begruessen, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs
