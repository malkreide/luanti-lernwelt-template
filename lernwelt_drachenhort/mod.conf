name = lernwelt_drachenhort
title = Lernwelt: Drachenhort
description = Markenfreies Lernwelt-Thema: ein Hort freundlicher Drachen. Drachenberg, lavafreier (ungefaehrlicher) Krater und schwebende Himmelsinseln, friedliche Drachen zum Anfreunden, ein Drachennest als Basis, Brut-Eier ausbrueten und Drachenbabys geduldig fuettern und zaehmen (Verantwortung & Geduld), Eier zaehlen und Farben zuordnen (MA.1, NMG), Drachen-Tagebuch, fliegender Reitdrache, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs
