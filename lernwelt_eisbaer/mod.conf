name = lernwelt_eisbaer
title = Lernwelt: Eisbaer-Bucht
description = Markenfreies Lernwelt-Thema: eine kalte Polarwelt (Eisbaer-Bucht). Basis ist ein Iglu/Eispalast, dazu drei Lern-Zonen - Gefrorener See, Schneewald und Polarlicht-Hoehle. Lernt Kaelte-Tiere und ihre Lebensraeume (Pinguin, Robbe, Walross, Eisbaer, Schneehase, Polarfuchs ...) und gestaltet Blau-Weiss-Muster (Lehrplan 21: NMG.2 Tiere & Lebensraeume). Mit fahrbarem Schlitten, leuchtendem Polarlicht (Aurora, das die Farbe wechselt), Futterstelle zum Tiere-Fuettern und Eisblumen zum Pflanzen. Polar-Logbuch, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs
