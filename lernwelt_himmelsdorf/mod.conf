name = lernwelt_himmelsdorf
title = Lernwelt: Himmelsdorf (Wolkenstadt)
description = Markenfreies Lernwelt-Thema: eine Himmelswelt (Himmelsdorf / Wolkenstadt). Basis ist eine Schwebeinsel, dazu drei Lern-Zonen - Regenbogenbruecke, Wolkenfelder und Ballonhafen. Lernt die sieben Regenbogenfarben, das Wetter (Sonne, Wolken, Regen, Gewitter, Regenbogen), oben/unten (Raumorientierung) und die Flug-Physik (warme Luft steigt). Mit fahrbarem Heissluftballon, leuchtendem Regenbogen-Block (wechselt die Farbe), Wetter-Station zum Wetter-Wechseln, Regenbogen-Samen zum Pflanzen und einem Hoehenmesser. Himmels-Logbuch, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen. (Lehrplan 21: NMG Wetter & Raumorientierung.)
depends = lernwelt
optional_depends = mobs, mcl_mobs
