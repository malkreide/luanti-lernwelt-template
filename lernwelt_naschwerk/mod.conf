name = lernwelt_naschwerk
title = Lernwelt: Naschwerk-Tal
description = Markenfreies Lernwelt-Thema: ein knallbuntes Suessigkeiten-Tal (Naschwerk-Tal). Basis ist ein Lebkuchenhaus, dazu drei Lern-Zonen - Schoko-Fluss, Lolli-Wald und Gummi-Huegel. Schwerpunkt fruehe Mathematik: Mengen zaehlen (MA.1), Muster legen und fortsetzen (rot-gelb-rot ...) und Farben benennen - optisch besonders ansprechend fuer kleine Kinder. Mit interaktivem Zaehl-Naschtisch (Zaehl-Spiel), fahrbarem Naschwagen, leuchtendem Regenbogen-Lolli (wechselt die Farbe), Naschschale zum Naschtiere-Fuettern und Lollis zum Pflanzen. Naschwerk-Logbuch, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs
