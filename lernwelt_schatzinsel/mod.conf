name = lernwelt_schatzinsel
title = Lernwelt: Schatzinsel
description = Markenfreies Lernwelt-Thema: eine freundliche Schatzinsel mit Schiff und Steg. Insel, Tropfsteinhoehle und Lagune, Schatzkarte und Kompass (Karte lesen, Himmelsrichtungen, oben/unten), Goldmuenzen zaehlen, Schnitzeljagd mit Bild-Wegweisern, Floss, rettbare Tiere, Bordbuch, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs
