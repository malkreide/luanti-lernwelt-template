name = lernwelt_schrauber
title = Lernwelt: Schrauber-Werkstatt
description = Markenfreies Lernwelt-Thema: eine Schrauber-Werkstatt voller Roboter. Fliessband, Energieraum und Recyclinghof als Lern-Zonen, einfache Logik zum Selber-Verdrahten (Schalter -> Leitung -> Lampe -> Tuer) als direkte Bruecke zu Mesecons, Roboter in der richtigen Reihenfolge zusammenbauen (ein Algorithmus), ein Fliessband das alles weiterschiebt und ein Recycler (aus Schrott wird ein neues Bauteil). Lernt Ursache & Wirkung, einfache Logik und Informatik-Grundlagen (Lehrplan 21: Medien & Informatik). Roboter-Katalog, Raenge und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = mobs, mcl_mobs, mesecons
