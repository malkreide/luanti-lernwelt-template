name = lernwelt_sonnenhof
title = Lernwelt: Sonnenhof (Zauber-Bauernhof)
description = Markenfreies Lernwelt-Thema: ein kinderfreundlicher Zauber-Bauernhof (Sonnenhof). Basis ist eine Scheune, dazu drei Lern-Zonen - Felder, Tiergehege und Muehle. Schwerpunkt NMG (Lehrplan 21): Pflanzen & Tiere, "Vom Samen zum Brot", Tierpflege, Nahrungskette und Geduld. Nutzt - wenn vorhanden - direkt Farming Redo (Saatgut, Korn, Mehl, Brot) und Animalia (Huhn, Kuh, Schaf, Schwein ...), funktioniert aber auch ohne diese Mods. Mit Zauber-Giesskanne (laesst Pflanzen wachsen), Zaubermuehle (Korn -> Mehl -> Brot), Futtertrog zum Tiere-Pflegen, eigenem Weizen-Feld zum Saeen und Ernten, Sonnenblumen, Sonnenhof-Logbuch, Raengen und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen.
depends = lernwelt
optional_depends = farming, animalia, mobs, mcl_mobs
