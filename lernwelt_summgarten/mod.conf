name = lernwelt_summgarten
title = Lernwelt: Summ-Garten (Bienen & Blumen)
description = Markenfreies Lernwelt-Thema: ein kinderfreundlicher Bienen-und-Blumen-Garten (Summ-Garten). Basis ist ein Bienenstock, dazu drei Lern-Zonen - Blumenwiese, Obstgarten und Honiglager. Das Thema verbindet NMG (Lehrplan 21: Natur, Bestaeubung) mit Geometrie/Mathematik (MA.2 Form & Raum: das Sechseck-Muster der Waben), dazu Farben (BG) und Zaehlen (MA.1). Mit Bestaeubungs-Pinsel (bestaeubt Blumen & Blueten, sammelt Nektar), Honigschleuder (Nektar -> Honig), gefuellten Honigwaben zum Honigtropfen-Zaehlen, einem Obstbluete-Beet (aus bestaeubter Bluete waechst eine Frucht), sechs bunten Blumen, Waben-Muster-Bloecken, Summ-Garten-Logbuch, Raengen und Abzeichen - baut auf der lernwelt-Engine auf. Startausruestung beim ersten Join zum schnellen Testen. Funktioniert ohne Zusatz-Mods; eine Mob-API (mobs_redo / mcl_mobs) belebt die Tiere.
depends = lernwelt
optional_depends = mobs, mcl_mobs
